<!-- 
Botões são elementos interativos em HTML usados para acionar ações quando clicados. Para criar um botão, você usa a tag <button>.

Esta é a sintaxe básica:

<button>Click Me</button>

Desafio

Fácil
Crie um documento HTML que inclua um botão usando a tag <button>. Faça o botão exibir o texto "Press Me". 
-->
<!DOCTYPE html>
<html>
    <body>
        <!-- Write code here -->
        <button>Press Me</button>
    </body>
</html>
