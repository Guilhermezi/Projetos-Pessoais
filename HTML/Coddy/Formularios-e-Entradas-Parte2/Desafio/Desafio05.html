<!-- Desafio

Fácil
Crie um documento HTML que inclua um formulário com os seguintes elementos:

Um campo de entrada de texto com o nome "username" e um placeholder "Enter your name".
Um botão de envio (<button type="submit">) com o texto "Register".
Um botão de reset (<button type="reset">) com o texto "Reset".
Use a tag <br> para mover os botões para uma nova linha. -->
<!DOCTYPE html>
<html>
    <body>
        <form>
            <!-- Campo de texto -->
            <input type="text" name="username" placeholder="Enter your name">
            
            <br> <!-- Move os botões para a próxima linha -->

            <!-- Botões -->
            <button type="submit">Register</button>
            <button type="reset">Reset</button>
        </form>
    </body>
</html>
