<!-- 
Desafio

Fácil
Crie um formulário HTML com:

Três checkboxes para hobbies: Reading, Gaming e Traveling.
Cada checkbox deve ter:
Um id único
O mesmo atributo name ("hobbies")
Um value correspondente ao hobby
Um label vinculado usando o atributo for
Use <br> após cada label para quebras de linha. 
-->
<!DOCTYPE html>
<html>
    <body>
        <!-- Write code here -->
        <form>
            <input type="checkbox" id="reading" name="hobbies" value="reading">
            <label for="reading">Reading</label>
            <input type="checkbox" id="gaming" name="hobbies" value="gaming">
            <label for="gaming">Gaming</label>
            <input type="checkbox" id="traveling" name="hobbies" value="traveling">
            <label for="traveling">Traveling</label>
        </form>
    </body>
</html>
