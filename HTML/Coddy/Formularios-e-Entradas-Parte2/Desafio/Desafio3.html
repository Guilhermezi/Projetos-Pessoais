<!-- 
Desafio

Fácil
Crie um documento HTML com os seguintes elementos:

Um parágrafo exibindo: "What is the capital of France?"
Um formulário contendo:
Um menu suspenso com o nome "capitals"
Quatro opções:
"Tokyo" (valor: "tokyo")
"Havana" (valor: "havana")
"Paris" (valor: "paris")
"Nairobi" (valor: "nairobi")
-->
<!DOCTYPE html>
<html>
    <body>
        <!-- Write code here -->
        <p>What is the capital of France?</p>
        <form>
            <select name="capitals">
                <option value="tokyo">Tokyo</option>
                <option value="havana">Havana</option>
                <option value="paris">Paris</option>
                <option value="nairobi">Nairobi</option>
            </select>
        </form>
    </body>
</html>
