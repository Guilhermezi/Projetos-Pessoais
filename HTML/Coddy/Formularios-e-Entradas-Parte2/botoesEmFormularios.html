<!-- 
    Os botões desempenham um papel fundamental em formulários, onde ajudam a enviar dados ou redefinir campos. Vamos ver como eles funcionam:

Botão de Submissão:
<form>
    <input type="text" name="username" placeholder="Enter username">
    <button type="submit">Submit</button>
</form>

type="submit": Envia os dados do formulário para o servidor.
Botão de Redefinição:
<form>
    <input type="text" name="name" value="John Doe">
    <button type="reset">Reset</button>
</form>

type="reset": Limpa todos os campos e os redefine para seus valores padrão.

Desafio

Fácil
Crie um documento HTML que inclua um formulário com diferentes tipos de botões. O formulário deve ter os seguintes elementos:

Um campo de entrada de texto com o nome "message" e um placeholder que diz "Enter your message".
Adicione um botão de envio (<button type="submit">) com o texto "Send".
Adicione um botão de reset (<button type="reset">) com o texto "Clear".
Adicione um botão genérico (<button>) com o texto "Click Me".
-->
<!DOCTYPE html>
<html>
    <body>
        <!-- Write code here -->
        <form>
            <input type="text" name="message" placeholder="Enter your message">
            <button type="submit">Send</button>
            <button type="reset">Clear</button>
            <button>Click Me</button>
        </form>
    </body>
</html>
