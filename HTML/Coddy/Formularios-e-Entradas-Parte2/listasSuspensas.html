<!-- 
Em HTML, um menu suspenso é uma lista de itens que aparece quando o usuário clica ou passa o mouse sobre um elemento. Menus suspensos são comumente usados para apresentar uma lista de opções de forma compacta. Para criar um menu suspenso, você usa a tag <select> junto com tags <option> para os itens individuais.

Aqui está a sintaxe básica para criar um menu suspenso em HTML:

<select name="dropdown">
    <option value="value1">Option 1</option>
    <option value="value2">Option 2</option>
    <option value="value3">Option 3</option>
</select>
<select>: A tag que define o menu suspenso.
name: Um atributo que dá um nome ao menu suspenso, usado para identificar o valor selecionado quando o formulário é enviado.
<option>: Uma tag que define um item na lista suspensa.
value: Um atributo que especifica o valor associado à opção. Esse valor é enviado ao servidor quando o formulário é enviado.
Option text: O texto visível que aparece na lista suspensa para cada opção.
Aqui está um exemplo de como criar um menu suspenso com três opções:

<select name="colors">
    <option value="red">Red</option>
    <option value="green">Green</option>
    <option value="blue">Blue</option>
</select>
Neste exemplo, temos um menu suspenso com o nome "colors" e três opções: Red, Green e Blue. 


Desafio

Fácil
Crie um documento HTML que inclua um formulário com um menu suspenso. O formulário deve ter os seguintes elementos:

Um menu suspenso com o nome "fruits".
O menu suspenso deve ter quatro opções com os seguintes valores e textos:
Valor: "apple", Texto: "Apple"
Valor: "banana", Texto: "Banana"
Valor: "orange", Texto: "Orange"
Valor: "grape", Texto: "Grape" 
-->
<!DOCTYPE html>
<html>
    <body>
        <!-- Write code here -->
        <select name="fruits">
            <option value="apple">Apple</option>
            <option value="banana">Banana</option>
            <option value="orange">Orange</option>
            <option value="grape">Grape</option>
        </select>
    </body>
</html>
