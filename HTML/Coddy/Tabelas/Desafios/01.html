<!-- Desafio

Fácil
Crie um documento HTML que inclua uma tabela com a seguinte estrutura:

Uma tag <table> para definir a tabela.
Uma linha de tabela (<tr>) para o cabeçalho com três células de cabeçalho (<th>). 
A primeira célula de cabeçalho deve dizer "Product", a segunda deve dizer "Price", e a terceira deve dizer "Quantity".
Uma linha de tabela (<tr>) com três células de dados (<td>). 
A primeira célula deve dizer "Laptop", a segunda deve dizer "$1000", e a terceira deve dizer "5".
Outra linha de tabela (<tr>) com três células de dados (<td>). 
A primeira célula deve dizer "Phone", a segunda deve dizer "$500", e a terceira deve dizer "10". -->
<!DOCTYPE html>
<html>
<body>

  <table>
    <tr>
      <th>Product</th>
      <th>Price</th>
      <th>Quantity</th>
    </tr>
    <tr>
      <td>Laptop</td>
      <td>$1000</td>
      <td>5</td>
    </tr>
    <tr>
      <td>Phone</td>
      <td>$500</td>
      <td>10</td>
    </tr>
  </table>

</body>
</html>
