<!-- Em HTML, uma tabela é uma forma de organizar dados em linhas e colunas. Tabelas são comumente usadas para exibir dados em um formato estruturado, como horários, estatísticas ou qualquer outro tipo de informação que possa ser apresentada em uma grade. Para criar uma tabela, você usa a tag <table> junto com outras tags como <tr> para linhas da tabela, <td> para dados da tabela (células) e <th> para cabeçalhos da tabela.

Aqui está a estrutura básica de uma tabela HTML:

<table>
    <tr>
        <th>Header 1</th>
        <th>Header 2</th>
    </tr>
    <tr>
        <td>Row 1, Cell 1</td>
        <td>Row 1, Cell 2</td>
    </tr>
    <tr>
        <td>Row 2, Cell 1</td>
        <td>Row 2, Cell 2</td>
    </tr>
</table>
<table>: A tag que define a tabela.
<tr>: A tag que define uma linha da tabela.
<th>: A tag que define uma célula de cabeçalho. Células de cabeçalho são tipicamente usadas para títulos de coluna ou linha e são exibidas em negrito por padrão.
<td>: A tag que define uma célula padrão na tabela.
Aqui está como esta tabela seria renderizada em um navegador:

Header 1	Header 2
Row 1, Cell 1	Row 1, Cell 2
Row 2, Cell 1	Row 2, Cell 2
Neste exemplo, temos uma tabela com duas linhas e duas colunas. A primeira linha contém células de cabeçalho, e as linhas subsequentes contêm células de dados regulares. Essa estrutura cria um layout de grade simples que é fácil de ler e entender.


Desafio

Fácil
Crie um documento HTML que inclua uma tabela com a seguinte estrutura:

Uma tag <table> para definir a tabela.
Uma linha de tabela (<tr>) para o cabeçalho com duas células de cabeçalho (<th>). A primeira célula de cabeçalho deve dizer "Name", e a segunda deve dizer "Age".
Uma linha de tabela (<tr>) com duas células de dados (<td>). A primeira célula deve dizer "John", e a segunda deve dizer "30".
Outra linha de tabela (<tr>) com duas células de dados (<td>). A primeira célula deve dizer "Jane", e a segunda deve dizer "25". -->
<!DOCTYPE html>
<html>
    <body>
        <!-- Write code here -->
         <table>
            <tr>
                <th>Name</th>
                <th>Age</th>
            </tr>
            <tr>
                <td>John</td>
                <td>30</td>
            </tr>
            <tr>
                <td>Jane</td>
                <td>25</td>
            </tr>
         </table>
    </body>
</html>
